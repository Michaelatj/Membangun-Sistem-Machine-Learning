name: Automated Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'preprocessing/automate_Michael.py'
      - 'social_media_mental_health.csv'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      # ── STEP 1: Checkout repo ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── STEP 2: Setup Python ──
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── STEP 3: Cek struktur file (debug) ──
      - name: Show Repository Structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== preprocessing/ folder ==="
          ls -la preprocessing/ || echo "Folder preprocessing/ tidak ditemukan!"

      # ── STEP 4: Install dependencies ──
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 numpy==1.26.4 scikit-learn==1.5.1

      # ── STEP 5: Jalankan script preprocessing ──
      - name: Run Automated Preprocessing
        run: |
          python preprocessing/automate_Michael.py \
            --input social_media_mental_health.csv \
            --output preprocessing/social_media_mental_health_preprocessing

      # ── STEP 6: Commit hasil preprocessing ke repo ──
      - name: Commit Preprocessed Dataset to Repository
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/social_media_mental_health_preprocessing/
          git diff --cached --quiet || git commit -m "ci: update preprocessed dataset [run #${{ github.run_number }}]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}